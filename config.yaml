# Single URL input (equivalent to CLI -u).
# Use this for one target URL.
# Leave empty when using input_file.
input_url: ""

# Batch URL list input file (equivalent to CLI -i).
# Use this for multi-target URLs, one per line.
# Leave empty when using input_url.
input_file: urls.txt

# XSS-only mode switch.
# true = skip collector stage and scan URLs from input_url/input_file directly.
# CLI usage: append -xss-only after -u or -i.
xss_only: false

# Legacy key (kept only for compatibility with old config):
# xss_only_file: urls.txt

# Output directory for all generated artifacts.
out_dir: output

# Scan profile presets: fast | balanced | deep
# Presets apply only when the corresponding value is 0/empty.
mode: balanced

# Optional custom parameter dictionary file.
# Leave empty string to disable.
param_dict_file: ""

# Enable verbose logs.
verbose: false

notify:
  # Enable notification when findings are produced.
  enabled: true

  # Notification provider (currently only dingtalk is supported).
  provider: dingtalk

  # Max notification count per site(hostname) in one scan task.
  max_per_site: 10

  # Internal async queue size for realtime notifications.
  queue_size: 200

  # HTTP timeout for notification requests (seconds).
  timeout_sec: 8

  dingtalk:
    # DingTalk bot webhook URL.
    webhook: ""

    # Optional DingTalk signing secret.
    # Leave empty if your bot does not require signature.
    secret: ""

collector:
  # Enable waymore collector.
  # Can be overridden by CLI: -waymore=true/false.
  # When enabled, roots are auto-derived from input_url/input_file
  # and passed to waymore in batch mode.
  use_waymore: true

  # Enable katana collector.
  # Standard high-coverage round.
  # Input source is input_url/input_file.
  use_katana: true

  # Enable katana headless collector.
  # Runs after standard katana round, used for SPA/dynamic route expansion.
  use_katana_headless: true

  # Add -no-sandbox only for katana headless round.
  # Recommended on VPS/container environments.
  katana_headless_no_sandbox: true

  # Katana crawling concurrency.
  # 0 means use mode default.
  katana_concurrency: 16

  # Katana crawl depth.
  # 0 means use mode default.
  katana_depth: 4

  # Katana headless round concurrency.
  # 0 means use mode default.
  katana_headless_concurrency: 8

  # Katana headless round depth.
  # 0 means follow katana_depth.
  katana_headless_depth: 0

target:
  # Enable target smart dedupe.
  # Groups similar URLs and limits repeated patterns.
  smart_dedupe: true

  # Max URL samples kept per target pattern.
  # 0 means use mode default.
  max_per_pattern: 10

  # Parameter strategy for target generation.
  # batch = URL params + related JS params + a small global high-value param set.
  #         In scan stage, hidden params are also limited to high-value names only.
  # deep  = try to use nearly all discovered params.
  # Leave empty to use mode default (balanced/fast -> batch, deep -> deep).
  param_strategy: batch

  # Small global param set used in batch mode across targets.
  # Keep this list focused; the goal is broad coverage without global param explosion.
  high_value_global_params:
    - q
    - query
    - search
    - keyword
    - kw
    - term
    - s
    - id
    - item
    - pid
    - cat
    - page
    - lang
    - sort
    - filter
    - file
    - path
    - url
    - redirect
    - return
scanner:
  # JS fetching/extraction worker count.
  # 0 means use mode default.
  js_workers: 14

  # Total scanner workers (used for auto split when custom split is not set).
  # 0 means use mode default.
  scan_workers: 20

  # Optional custom worker split for scanner pipeline.
  # If all three are >0, they override auto split.
  # target_workers: prefetch baseline + param preparation
  # quick_workers: batch reflection probing
  # verify_workers: second-stage evidence verification
  target_workers: 0
  quick_workers: 0
  verify_workers: 0

  # HTTP timeout in seconds.
  # 0 means use mode default.
  http_timeout_sec: 15

  # Max params tested per URL when all_params=false.
  # Ignored when all_params=true.
  max_params_per_url: 20

  # Test all discovered params for each URL.
  # true = full param coverage, false = respect max_params_per_url.
  all_params: true

  # Batch size for quick GET probing.
  # Example: 45 means probe 45 params in one request.
  param_batch_size: 45

  # Split scan targets into batches to reduce peak memory during scanner stage.
  # true = run scanner in chunks and merge all findings into one final report.
  scan_batch_enabled: true

  # Max target count per scan batch when scan batching is enabled.
  # 0 means use mode default.
  scan_batch_size: 2000

  # Enable POST reflected XSS scan for application/x-www-form-urlencoded forms.
  # true = parse HTML forms (method=post) and run POST quick/verify pipeline.
  enable_post_scan: true

  # Batch size for quick POST probing.
  # POST can carry more params in one request body than GET query.
  post_param_batch_size: 80

  # Max POST forms parsed per page URL.
  # Lower values reduce request explosion on heavy pages.
  max_post_forms_per_url: 8

  # Max params tested per POST form.
  # 0 means use mode default.
  max_post_params_per_form: 120

  # Similar-page strategy: sample N targets per template group in phase-1.
  # 0 means disable template sampling (xscan-like behavior).
  sample_per_group: 0

  # After phase-1, expand scan to remaining targets only for hit groups.
  expand_on_hit: true

  # Enable request value-shape dedupe in scan stage.
  # This reduces repeated scanning of semantically similar requests.
  shape_dedupe_enabled: true

  # Max samples kept per value-shape fingerprint before skipping.
  # Lower = faster, Higher = more coverage.
  shape_threshold: 15


